<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>PoetryShazam — Where Words Bleed & Artists Battle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
            color: #f4efe9;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0 25px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 20%, #d4af37 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 11px;
            color: #8b796d;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 12px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #8b796d;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #d4af37;
            margin-bottom: 20px;
        }

        /* Battle List */
        .battle-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .battle-item:hover {
            border-color: rgba(212, 175, 55, 0.3);
        }

        .battle-item.active {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }

        .battle-item.completed {
            opacity: 0.7;
            border-color: rgba(212, 175, 55, 0.3);
        }

        .battle-poets {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .poet-name {
            font-weight: 600;
            font-size: 14px;
        }

        .poet-name-input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 8px;
            padding: 4px 8px;
            color: white;
            font-size: 14px;
            width: 120px;
        }

        .vs {
            color: #d4af37;
            font-weight: 800;
            font-size: 12px;
        }

        .battle-scores {
            font-size: 11px;
            color: #d4af37;
            margin-top: 6px;
        }

        .status-badge {
            background: rgba(212, 175, 55, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        .status-badge.completed {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
        }

        /* Arena */
        .arena {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .poet-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .poet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .poet-name-large {
            font-size: 20px;
            font-weight: 700;
            background: none;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .poet-name-large:focus {
            outline: none;
            background: rgba(212,175,55,0.1);
            border: 1px solid #d4af37;
        }

        .mic-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 2px solid #d4af37;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mic-btn.recording {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.3);
            animation: pulse 1.5s infinite;
        }

        .stop-btn {
            background: rgba(139, 69, 19, 0.3);
            border: 2px solid #8B4513;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stop-btn:hover {
            background: rgba(139, 69, 19, 0.5);
            transform: scale(1.05);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .poem-textarea {
            width: 100%;
            min-height: 140px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            font-family: 'Inter', monospace;
        }

        .poem-textarea:focus {
            outline: none;
            border-color: #d4af37;
        }

        .poet-stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            font-size: 12px;
        }

        .stat {
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .stat-label {
            color: #8b796d;
        }

        .stat-value {
            color: #d4af37;
            font-weight: 600;
            margin-left: 6px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #12121a;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .add-battle-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .add-battle-form input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
        }

        .add-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            color: #d4af37;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn:hover {
            background: rgba(212, 175, 55, 0.3);
            color: #fff;
        }

        .start-btn {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            color: #12121a;
            cursor: pointer;
            margin-top: 16px;
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .remaining {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #8b796d;
        }

        /* Results Modal */
        .results-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1000;
            overflow-y: auto;
            padding: 24px;
            display: none;
        }

        .results-screen.active {
            display: block;
        }

        .close-results {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 28px;
            cursor: pointer;
            float: right;
        }

        .results-table {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .criteria-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .criteria-header {
            font-weight: 700;
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
        }

        .text-center {
            text-align: center;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #d4af37;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .archive-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .archive-item:hover {
            background: rgba(212,175,55,0.1);
        }

        .remove-battle {
            background: rgba(212, 175, 55, 0.15);
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            color: #d4af37;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">POETRYSHAZAM</div>
            <div class="tagline">WHERE WORDS BLEED & ARTISTS BATTLE</div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('arena')">🔥 LIVE ARENA</button>
            <button class="tab-btn" onclick="switchTab('archive')">📜 ARCHIVE</button>
            <button class="tab-btn" onclick="switchTab('setup')">⚙️ SETUP</button>
        </div>

        <!-- Tab: Setup -->
        <div id="tab-setup" class="tab-content">
            <div class="card">
                <div class="card-title">CONFIGURE TOURNAMENT</div>
                <div id="battles-list-setup"></div>
                <div class="add-battle-form">
                    <input type="text" id="poet1-name-input" placeholder="Poet 1 Name">
                    <input type="text" id="poet2-name-input" placeholder="Poet 2 Name">
                    <button class="add-btn" onclick="addBattle()">+ ADD BATTLE</button>
                </div>
                <button class="start-btn" id="start-tournament-btn" onclick="startTournament()">START TOURNAMENT</button>
                <div class="remaining" id="remaining-battles">0 battles configured</div>
            </div>
        </div>

        <!-- Tab: Live Arena -->
        <div id="tab-arena" class="tab-content active">
            <div class="dashboard">
                <div>
                    <div class="card">
                        <div class="card-title">BATTLES</div>
                        <div id="battles-list"></div>
                    </div>
                </div>
                <div>
                    <div class="card">
                        <div class="card-title">LIVE ARENA</div>
                        <div id="arena-content">
                            <div style="text-align: center; color: #8b796d; padding: 40px;">Configure battles to start</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Archive -->
        <div id="tab-archive" class="tab-content">
            <div class="card">
                <div class="card-title">COMPLETED BATTLES</div>
                <div id="archive-list"></div>
            </div>
        </div>
    </div>

    <!-- Results Modal -->
    <div id="results-screen" class="results-screen">
        <button class="close-results" onclick="closeResults()">✕</button>
        <div style="max-width: 600px; margin: 0 auto;">
            <h2 id="results-title" style="font-size: 28px; margin-bottom: 20px;">Battle Analysis</h2>
            <div id="results-content"></div>
            <button class="submit-btn" onclick="closeResults()" style="margin-top: 30px;">Back to Arena</button>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div style="margin-top: 20px; color: #d4af37;">🤖 YandexGPT analyzing...</div>
    </div>

    <script>
        const SHEETY_API_URL = "/api/battle";

        let battles = [];
        let currentBattleIndex = 0;
        let tournamentStarted = false;
        let recordingActive = false;
        let recognition = null;
        let currentRecordingPoet = 1;
        let recordingTimer = null;
        let recordingSeconds = 0;
        let completedBattles = [];

        // Load from localStorage
        function loadData() {
            const saved = localStorage.getItem('poetryShazamBattles');
            if (saved) {
                battles = JSON.parse(saved);
            }
            if (battles.length === 0) {
                battles = [
                    { id: 1, poet1: "Василь", poet2: "Товченников", poem1: "", poem2: "", time1: "", time2: "", completed: false, result: null, scores: null },
                    { id: 2, poet1: "Анна", poet2: "Михаил", poem1: "", poem2: "", time1: "", time2: "", completed: false, result: null, scores: null }
                ];
            }
            
            const savedArchive = localStorage.getItem('poetryShazamArchive');
            if (savedArchive) {
                completedBattles = JSON.parse(savedArchive);
            }
            
            renderAll();
        }

        function saveBattles() {
            localStorage.setItem('poetryShazamBattles', JSON.stringify(battles));
            renderAll();
        }

        function saveToArchive(battle, result) {
            const archived = {
                id: battle.id,
                poet1: battle.poet1,
                poet2: battle.poet2,
                poem1: battle.poem1,
                poem2: battle.poem2,
                time1: battle.time1,
                time2: battle.time2,
                result: result,
                completedAt: new Date().toISOString()
            };
            completedBattles.unshift(archived);
            localStorage.setItem('poetryShazamArchive', JSON.stringify(completedBattles));
            renderArchive();
        }

        function addBattle() {
            const poet1 = document.getElementById('poet1-name-input').value.trim();
            const poet2 = document.getElementById('poet2-name-input').value.trim();
            if (!poet1 || !poet2) {
                alert("Please enter both poet names");
                return;
            }
            battles.push({
                id: Date.now(),
                poet1: poet1,
                poet2: poet2,
                poem1: "",
                poem2: "",
                time1: "",
                time2: "",
                completed: false,
                result: null,
                scores: null
            });
            document.getElementById('poet1-name-input').value = "";
            document.getElementById('poet2-name-input').value = "";
            saveBattles();
        }

        function updatePoetName(battleId, poetNum, newName) {
            const battle = battles.find(b => b.id === battleId);
            if (battle) {
                if (poetNum === 1) battle.poet1 = newName;
                else battle.poet2 = newName;
                saveBattles();
                if (tournamentStarted && currentBattleIndex === battles.findIndex(b => b.id === battleId)) {
                    renderArena(battle);
                }
            }
        }

        function startTournament() {
            if (battles.length === 0) {
                alert("Please add at least one battle first");
                return;
            }
            tournamentStarted = true;
            currentBattleIndex = 0;
            document.getElementById('start-tournament-btn').disabled = true;
            document.getElementById('start-tournament-btn').textContent = "TOURNAMENT IN PROGRESS";
            renderAll();
            renderArena(battles[0]);
        }

        function selectBattle(index) {
            if (!tournamentStarted) return;
            currentBattleIndex = index;
            renderAll();
            renderArena(battles[currentBattleIndex]);
        }

        // Web Speech API
        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("❌ Your browser doesn't support speech recognition. Please use Chrome.");
                return false;
            }
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ru-RU';
            return true;
        }

        function startRecording(poetNum) {
            if (!recognition && !initSpeechRecognition()) return;
            
            if (recordingActive) {
                stopRecording();
                if (currentRecordingPoet === poetNum) return;
            }
            
            currentRecordingPoet = poetNum;
            recordingActive = true;
            
            const battle = battles[currentBattleIndex];
            const textarea = document.getElementById(`poem-${poetNum}`);
            if (textarea) {
                textarea.value = "";
            }
            
            let finalText = "";
            let interimText = "";
            
            recognition.onresult = (event) => {
                let interim = "";
                let final = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        final += event.results[i][0].transcript + " ";
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                finalText += final;
                interimText = interim;
                if (textarea) {
                    textarea.value = (finalText + interimText).trim();
                    textarea.scrollTop = textarea.scrollHeight;
                }
            };
            
            recognition.onerror = (event) => {
                if (event.error === 'no-speech') return;
                console.error("Recognition error:", event.error);
            };
            
            recognition.onend = () => {
                if (recordingActive && currentRecordingPoet === poetNum) {
                    if (textarea) {
                        const finalPoem = finalText.trim();
                        textarea.value = finalPoem;
                        if (poetNum === 1) {
                            battle.poem1 = finalPoem;
                            battle.time1 = formatTime(recordingSeconds);
                        } else {
                            battle.poem2 = finalPoem;
                            battle.time2 = formatTime(recordingSeconds);
                        }
                        saveBattles();
                    }
                    const micBtn = document.getElementById(`mic-${poetNum}`);
                    if (micBtn) micBtn.classList.remove('recording');
                    recordingActive = false;
                    stopTimerDisplay();
                }
            };
            
            recognition.start();
            startTimerDisplay(poetNum);
            
            const micBtn = document.getElementById(`mic-${poetNum}`);
            if (micBtn) micBtn.classList.add('recording');
        }

        function stopRecording() {
            if (recognition && recordingActive) {
                recognition.stop();
                recordingActive = false;
                stopTimerDisplay();
            }
        }

        let timerInterval = null;
        
        function startTimerDisplay(poetNum) {
            recordingSeconds = 0;
            const timerDisplay = document.getElementById(`timer-${poetNum}`);
            if (timerDisplay) timerDisplay.innerHTML = "00:00";
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                recordingSeconds++;
                if (timerDisplay) timerDisplay.innerHTML = formatTime(recordingSeconds);
            }, 1000);
        }
        
        function stopTimerDisplay() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function formatTime(sec) {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }

        function updatePoemText(poetNum, value) {
            const battle = battles[currentBattleIndex];
            if (poetNum === 1) {
                battle.poem1 = value;
            } else {
                battle.poem2 = value;
            }
            saveBattles();
        }

        async function submitBattle() {
            const battle = battles[currentBattleIndex];
            
            if (!battle.poem1 || battle.poem1.length < 20) {
                alert(`⚠️ ${battle.poet1}'s poem is too short (minimum 20 characters).`);
                return;
            }
            if (!battle.poem2 || battle.poem2.length < 20) {
                alert(`⚠️ ${battle.poet2}'s poem is too short (minimum 20 characters).`);
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(SHEETY_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: battle.id,
                        p1Name: battle.poet1,
                        p1Text: battle.poem1,
                        p1Time: battle.time1 || "00:30",
                        p2Name: battle.poet2,
                        p2Text: battle.poem2,
                        p2Time: battle.time2 || "00:30"
                    })
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    battle.completed = true;
                    battle.result = result;
                    battle.scores = result.rawDetails;
                    
                    saveToArchive(battle, result);
                    saveBattles();
                    
                    showResults(battle, result);
                    
                    if (currentBattleIndex + 1 < battles.length) {
                        currentBattleIndex++;
                        renderArena(battles[currentBattleIndex]);
                        renderAll();
                    } else {
                        tournamentStarted = false;
                        document.getElementById('start-tournament-btn').disabled = false;
                        document.getElementById('start-tournament-btn').textContent = "START TOURNAMENT";
                        document.getElementById('arena-content').innerHTML = '<div style="text-align: center; color: #d4af37; padding: 40px;">🏆 TOURNAMENT COMPLETED! 🏆</div>';
                        renderAll();
                    }
                } else {
                    throw new Error(result.message);
                }
            } catch(err) {
                alert("❌ Error: " + err.message);
            } finally {
                showLoading(false);
            }
        }

        function showResults(battle, result) {

                        <div style="text-align: center; flex: 1;">

                        <div style="text-align: center; flex: 1;">

                    <div class="results-table">

                            <div>🎭 Rhyme & Structure</div>
                            <div class="text-center">${details.p1Rhyme || 0}/5</div>
                            <div class="text-center">${details.p2Rhyme || 0}/5</div>
                        </div>
                        <div class="criteria-row">
                            <div>🎨 Imagery & Metaphors</div>

                            <div class="text-center">${details.p2Imagery || 0}/5</div>

                        <div class="criteria-row">

                        </div>
                        <div class="criteria-row">

                        <div class="criteria-row">

                            <div class="text-center">${details.p2Expression || 0}/5</div>

                    </div>
                    
                    <div style="margin-top: 20px; padding: 16px; background: rgba(212,175,55,0.1); border-radius: 12px;">
                        <div style="color: #d4af37; font-weight: bold;">🏆 VERDICT</div>
                        <p>${escapeHtml(result.totalVerdict)}</p>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <div style="color: #d4af37; font-weight: bold;">📖 ${escapeHtml(battle.poet1)} - CRITIQUE</div>
                        <p>${escapeHtml(result.p1Critique)}</p>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <div style="color: #d4af37; font-weight: bold;">📖 ${escapeHtml(battle.poet2)} - CRITIQUE</div>
                        <p>${escapeHtml(result.p2Critique)}</p>
                    </div>
                </div>
            `;
            
            document.getElementById('results-screen').classList.add('active');
        }

        function viewArchiveBattle(battle) {
            const result = battle.result;
            const p1Content = parseFloat(result.p1Content);
            const p1Delivery = parseFloat(result.p1Delivery);
            const p2Content = parseFloat(result.p2Content);
            const p2Delivery = parseFloat(result.p2Delivery);
            const avg1 = ((p1Content + p1Delivery) / 2).toFixed(1);
            const avg2 = ((p2Content + p2Delivery) / 2).toFixed(1);
            const details = result.rawDetails || {};
            
            document.getElementById('results-content').innerHTML = `
                <div style="background: rgba(0,0,0,0.4); border-radius: 16px; padding: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
                        <div style="text-align: center; flex: 1;">
                            <h3 style="color: #d4af37;">${escapeHtml(battle.poet1)}</h3>
                            <div style="font-size: 42px; font-weight: 800;">${avg1}</div>
                        </div>
                        <div style="text-align: center; flex: 1;">
                            <h3 style="color: #d4af37;">VS</h3>
                        </div>
                        <div style="text-align: center; flex: 1;">
                            <h3 style="color: #d4af37;">${escapeHtml(battle.poet2)}</h3>
                            <div style="font-size: 42px; font-weight: 800;">${avg2}</div>
                        </div>
                    </div>
                    
                    <div class="results-table">
                        <div class="criteria-row criteria-header">
                            <div>Criteria</div>
                            <div class="text-center">${escapeHtml(battle.poet1)}</div>
                            <div class="text-center">${escapeHtml(battle.poet2)}</div>
                        </div>
                        <div class="criteria-row"><div>🎭 Rhyme & Structure</div><div class="text-center">${details.p1Rhyme || 0}/5</div><div class="text-center">${details.p2Rhyme || 0}/5</div></div>
                        <div class="criteria-row"><div>🎨 Imagery & Metaphors</div><div class="text-center">${details.p1Imagery || 0}/5</div><div class="text-center">${details.p2Imagery || 0}/5</div></div>
                        <div class="criteria-row"><div>📚 Meaning & Depth</div><div class="text-center">${details.p1Meaning || 0}/5</div><div class="text-center">${details.p2Meaning || 0}/5</div></div>
                        <div class="criteria-row"><div>🗣️ Diction & Clarity</div><div class="text-center">${details.p1Diction || 0}/5</div><div class="text-center">${details.p2Diction || 0}/5</div></div>
                        <div class="criteria-row"><div>🎵 Rhythm & Flow</div><div class="text-center">${details.p1Rhythm || 0}/5</div><div class="text-center">${details.p2Rhythm || 0}/5</div></div>
                        <div class="criteria-row"><div>💥 Expression & Emotion</div><div class="text-center">${details.p1Expression || 0}/5</div><div class="text-center">${details.p2Expression || 0}/5</div></div>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 16px; background: rgba(212,175,55,0.1); border-radius: 12px;">
                        <div style="color: #d4af37; font-weight: bold;">🏆 VERDICT</div>
                        <p>${escapeHtml(result.totalVerdict)}</p>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <div style="color: #d4af37; font-weight: bold;">📖 ${escapeHtml(battle.poet1)} - CRITIQUE</div>
                        <p>${escapeHtml(result.p1Critique)}</p>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <div style="color: #d4af37; font-weight: bold;">📖 ${escapeHtml(battle.poet2)} - CRITIQUE</div>
                        <p>${escapeHtml(result.p2Critique)}</p>
                    </div>
                </div>
            `;
            document.getElementById('results-screen').classList.add('active');
        }

        function closeResults() {
            document.getElementById('results-screen').classList.remove('active');
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }

        function escapeHtml(str) {
            if (!str) return str;
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tab === 'arena') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('tab-arena').classList.add('active');
            } else if (tab === 'archive') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('tab-archive').classList.add('active');
                renderArchive();
            } else if (tab === 'setup') {
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
                document.getElementById('tab-setup').classList.add('active');
            }
        }

        function renderArchive() {
            const container = document.getElementById('archive-list');
            if (!container) return;
            
            if (completedBattles.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #8b796d; padding: 40px;">No completed battles yet</div>';
                return;
            }
            
            container.innerHTML = completedBattles.map(b => {
                const avg1 = ((parseFloat(b.result.p1Content) + parseFloat(b.result.p1Delivery)) / 2).toFixed(1);
                const avg2 = ((parseFloat(b.result.p2Content) + parseFloat(b.result.p2Delivery)) / 2).toFixed(1);
                return `
                    <div class="archive-item" onclick='viewArchiveBattle(${JSON.stringify(b)})'>
                        <div class="battle-poets">
                            <span class="poet-name">${escapeHtml(b.poet1)}</span>
                            <span class="vs">VS</span>
                            <span class="poet-name">${escapeHtml(b.poet2)}</span>
                        </div>
                        <div class="battle-scores">🏆 ${avg1} : ${avg2}</div>
                        <div class="status-badge completed">Completed</div>
                    </div>
                `;
            }).join('');
        }

        function renderAll() {
            renderBattlesList();
            renderSetupList();
            updateRemaining();
        }

        function renderBattlesList() {
            const container = document.getElementById('battles-list');
            if (!container) return;
            
            if (battles.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #8b796d; padding: 20px;">No battles yet</div>';
                return;
            }

            container.innerHTML = battles.map((battle, idx) => {
                const avg1 = battle.result ? ((parseFloat(battle.result.p1Content) + parseFloat(battle.result.p1Delivery)) / 2).toFixed(1) : null;
                const avg2 = battle.result ? ((parseFloat(battle.result.p2Content) + parseFloat(battle.result.p2Delivery)) / 2).toFixed(1) : null;
                return `
                    <div class="battle-item ${battle.completed ? 'completed' : ''} ${tournamentStarted && currentBattleIndex === idx ? 'active' : ''}" onclick="selectBattle(${idx})">
                        <div class="battle-poets">
                            <span class="poet-name">${escapeHtml(battle.poet1)}</span>
                            <span class="vs">VS</span>
                            <span class="poet-name">${escapeHtml(battle.poet2)}</span>
                        </div>
                        ${battle.completed && avg1 ? `<div class="battle-scores">🏆 ${avg1} : ${avg2}</div>` : ''}
                        <div class="status-badge ${battle.completed ? 'completed' : ''}">${battle.completed ? '✅ Completed' : '⏳ Pending'}</div>
                    </div>
                `;
            }).join('');
        }

        function renderSetupList() {
            const container = document.getElementById('battles-list-setup');
            if (!container) return;
            
            if (battles.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #8b796d; padding: 20px;">No battles yet. Add your first battle!</div>';
                return;
            }

            container.innerHTML = battles.map((battle, idx) => `
                <div class="battle-item">
                    <div class="battle-poets">
                        <input class="poet-name-input" value="${escapeHtml(battle.poet1)}" onchange="updatePoetName(${battle.id}, 1, this.value)">
                        <span class="vs">VS</span>
                        <input class="poet-name-input" value="${escapeHtml(battle.poet2)}" onchange="updatePoetName(${battle.id}, 2, this.value)">
                        <button class="remove-battle" onclick="removeBattle(${idx})">✕</button>
                    </div>
                    <div class="status-badge ${battle.completed ? 'completed' : ''}">${battle.completed ? 'Completed' : 'Pending'}</div>
                </div>
            `).join('');
        }

        function removeBattle(index) {
            battles.splice(index, 1);
            saveBattles();
            if (tournamentStarted && currentBattleIndex >= battles.length) {
                tournamentStarted = false;
                document.getElementById('start-tournament-btn').disabled = false;
                document.getElementById('start-tournament-btn').textContent = "START TOURNAMENT";
            }
        }

        function updateRemaining() {
            const remaining = battles.filter(b => !b.completed).length;
            const span = document.getElementById('remaining-battles');
            if (span) span.innerHTML = `${remaining} battles remaining`;
        }

        function renderArena(battle) {
            if (!battle) return;
            
            const container = document.getElementById('arena-content');
            container.innerHTML = `
                <div class="arena">
                    <div class="poet-card">
                        <div class="poet-header">
                            <input class="poet-name-large" value="${escapeHtml(battle.poet1)}" onchange="updatePoetName(${battle.id}, 1, this.value)">
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <div id="timer-1" class="timer"></div>
                                <button class="mic-btn" id="mic-1" onclick="startRecording(1)">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#d4af37">
                                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                                    </svg>
                                </button>
                                <button class="stop-btn" onclick="stopRecording()">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#d4af37">
                                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <textarea class="poem-textarea" id="poem-1" placeholder="Poem text appears here... or type manually" oninput="updatePoemText(1, this.value)">${escapeHtml(battle.poem1)}</textarea>
                        <div class="poet-stats">
                            <div class="stat"><span class="stat-label">Time:</span> <span class="stat-value">${battle.time1 || '00:00'}</span></div>
                            ${battle.result ? `<div class="stat"><span class="stat-label">Score:</span> <span class="stat-value">${((parseFloat(battle.result.p1Content) + parseFloat(battle.result.p1Delivery)) / 2).toFixed(1)}/5</span></div>` : ''}
                        </div>
                    </div>
                    
                    <div style="text-align: center; font-size: 24px; font-weight: 800; color: #d4af37;">VS</div>
                    
                    <div class="poet-card">
                        <div class="poet-header">
                            <input class="poet-name-large" value="${escapeHtml(battle.poet2)}" onchange="updatePoetName(${battle.id}, 2, this.value)">
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <div id="timer-2" class="timer"></div>
                                <button class="mic-btn" id="mic-2" onclick="startRecording(2)">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#d4af37">
                                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                                    </svg>
                                </button>
                                <button class="stop-btn" onclick="stopRecording()">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#d4af37">
                                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <textarea class="poem-textarea" id="poem-2" placeholder="Poem text appears here... or type manually" oninput="updatePoemText(2, this.value)">${escapeHtml(battle.poem2)}</textarea>
                        <div class="poet-stats">
                            <div class="stat"><span class="stat-label">Time:</span> <span class="stat-value">${battle.time2 || '00:00'}</span></div>
                            ${battle.result ? `<div class="stat"><span class="stat-label">Score:</span> <span class="stat-value">${((parseFloat(battle.result.p2Content) + parseFloat(battle.result.p2Delivery)) / 2).toFixed(1)}/5</span></div>` : ''}
                        </div>
                    </div>
                    
                    <button class="submit-btn" onclick="submitBattle()">SUBMIT BATTLE TO JUDGES</button>
                </div>
            `;
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
